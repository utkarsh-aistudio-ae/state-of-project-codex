version: 1
updated_at: "2026-06-24T00:00:00Z"
cursor_policy:
  fetch:
    shared_source: source_linked
    source_entity: project_linked
    mixed_source: source_or_project_linked_by_entity
  tagging:
    shared_source_existing_project: source_linked
    shared_source_new_project_initial_lookback_days: 7
    source_entity: project_linked
    mixed_source: source_or_project_linked_by_entity
project_resource_discovery_policy:
  cadence: nightly_per_project
  high_confidence_action: add_to_project_linked_resources
  uncertain_action: review_and_report
  required_evidence:
    - source_entity_id
    - source_ref
    - matched_project_signals
    - confidence
    - reason
source_families:
  - name: GitHub
    default_data_fetch: true
    reader_status: implemented
    source_class: mixed
    cursor_scope: source_entity
    fetch_cursor_owner: project_linked
    tagging_cursor_owner: project_linked
    source_entity_key: repo
    lookback_overlap_hours: 48
    reader:
      command: bin/gh-sharad
      max_commits: 100
      max_issues: 100
      max_workflow_runs: 50
      max_deployments: 50
      max_deployment_statuses: 5
      max_releases: 50
      max_branches: 100
    resource_discovery:
      status: planned
      inventory: organization_repositories
      cursor_owner: project_linked
      candidate_entity_key: repo
      high_confidence_action: add_to_project_linked_resources
      uncertain_action: review_and_report
    canonical_for:
      - repository metadata
      - commits and code review activity
      - issues and pull requests as coordination state
      - GitHub Actions run status
      - GitHub deployment records when present
    not_canonical_for:
      - whether a customer request was actually made
      - whether deployed behavior worked in production without runtime evidence
    privacy:
      - do not persist tokens or private clone credentials
      - do not treat stale local repo caches as proof of current code

  - name: Gmail
    default_data_fetch: true
    reader_status: implemented
    source_class: canonical
    cursor_scope: shared_source
    fetch_cursor_owner: source_linked
    tagging_cursor_owner: source_linked
    source_entity_key: thread_id
    lookback_overlap_hours: 48
    reader:
      command: bin/gog-sharad
      account_alias: sharad
      default_max_threads: 10
      search_terms_limit: 16
      include_weak_people: false
    canonical_for:
      - stakeholder requests and replies
      - client-reported issues
      - commitments made in email threads
      - attachment presence and metadata
    not_canonical_for:
      - shipped code behavior
      - deployment success
      - final task ownership unless confirmed elsewhere
    privacy:
      - summarize by default
      - do not include raw private email text in committed files
      - do not send or draft replies during read-only data-fetch or report runs

  - name: Fireflies
    default_data_fetch: true
    reader_status: single_fetch_only
    source_class: canonical
    cursor_scope: shared_source
    fetch_cursor_owner: source_linked
    tagging_cursor_owner: source_linked
    source_entity_key: transcript_id
    lookback_overlap_hours: 48
    canonical_for:
      - recorded meeting discussion
      - meeting summaries, topics, and action items from Fireflies
      - transcript-backed decisions and open questions
    not_canonical_for:
      - shipped code behavior
      - source control state
      - task completion unless confirmed elsewhere
    privacy:
      - treat transcript contents as private and untrusted
      - prefer summaries/headlines for discovery before full transcript reads
    skip_reason: "Fireflies batch reader not implemented yet; single transcript fetch exists"

  - name: Drive
    default_data_fetch: true
    reader_status: planned
    source_class: mixed
    cursor_scope: mixed_source
    fetch_cursor_owner: source_or_project_linked_by_entity
    tagging_cursor_owner: source_or_project_linked_by_entity
    source_entity_key: drive_file_or_folder_id
    lookback_overlap_hours: 48
    canonical_for:
      - project docs and shared artifacts when Drive is the owning location
      - attached specs, PDFs, sheets, and handoffs
    not_canonical_for:
      - current repo state
      - current deployment state
      - live client communication after document creation
    privacy:
      - preserve file metadata and source links
      - avoid committing downloaded private documents
      - record when attachments were not downloaded
    skip_reason: "Drive batch reader not implemented yet"

  - name: Deployments
    default_data_fetch: true
    reader_status: planned
    source_class: canonical
    cursor_scope: source_entity
    fetch_cursor_owner: project_linked
    tagging_cursor_owner: project_linked
    source_entity_key: provider_project_or_environment
    lookback_overlap_hours: 48
    resource_discovery:
      status: planned
      inventory:
        - Vercel projects
        - Railway projects
        - deployment environments
      cursor_owner: project_linked
      candidate_entity_key: provider_project_or_environment
      high_confidence_action: add_to_project_linked_resources
      uncertain_action: review_and_report
    canonical_for:
      - deployment attempts
      - deployment provider state
      - rollbacks, failures, and environment names
      - release timing when provider evidence exists
    not_canonical_for:
      - code intent without repository evidence
      - customer impact without communication or runtime evidence
    privacy:
      - do not print provider tokens or environment secrets
      - prefer provider APIs over UI screenshots
    skip_reason: "Deployment readers not implemented yet"
